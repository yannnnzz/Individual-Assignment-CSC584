<!DOCTYPE html>
<html>
<head>
    <title>Personal Profile Form</title>

    <style>

        body{
            background: linear-gradient(to right, #cceeff, #66b3ff);
            font-family: Arial, sans-serif;
            margin:0;
            padding:0;
        }

        .box{
            margin-top:50px;
            padding:30px;
            background:#b4d5ed;
            border-radius:20px;
            box-shadow:0px 0px 10px gray;
            max-width:700px;
        }

        h1{
            margin-bottom:20px;
            color:#ffc1cc;
        }

    </style>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container box">

    <h1 class="text-center">Personal Profile Form</h1>

    <form action="ProfileServlet" method="post">

        <div class="mb-3">
            <label>Name</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Student ID</label>
            <input type="text"
                   name="studentID"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Programme</label>
            <input type="text"
                   name="programme"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Hobbies</label>
            <input type="text"
                   name="hobbies"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Introduction</label>
            <textarea name="introduction"
                      class="form-control"
                      rows="4"></textarea>
        </div>

        <button type="submit"
                class="btn btn-primary w-100">

            Submit

        </button>

        <br><br>

        <a href="ViewProfilesServlet"
           class="btn btn-success w-100">

            View All Profiles

        </a>

    </form>

</div>

</body>
</html>
